services:
  fe:
    image: ghcr.io/phurba-sherpa/task-management-system/tms-fe
    ports:
      - 3000:80
    networks:
      - webserver_nw

  be:
    depends_on:
      db:
        condition: service_healthy
    image: ghcr.io/phurba-sherpa/task-management-system/tms-be
    ports:
      - 8080:8080
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:?Db password required}
      - DB_NAME=${DB_NAME:-tms-db}
    networks:
      - dbserver_nw
      - webserver_nw

  db:
    environment:
      - POSTGRES_PASSWORD=${DB_PASSWORD:?Db password required}
      - POSTGRES_DB=${DB_NAME:-tms-db}
      - POSTGRES_USER=${DB_USER:-postgres}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-tms-db}"]
      interval: 5s
      timeout: 5s
      retries: 12
    volumes:
      - pg_data:/var/lib/postgresql
    networks:
      - dbserver_nw

volumes:
  pg_data:

networks:
  dbserver_nw:
    name: dbserver_nw
  webserver_nw:
    name: webserver_nw
